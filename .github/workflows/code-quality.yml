name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint mypy bandit types-requests

    - name: Run pylint
      run: |
        pylint weather_shield.py app.py --fail-under=8 || true

    - name: Type checking with mypy
      run: |
        mypy weather_shield.py app.py --ignore-missing-imports || true

    - name: Security scan with bandit
      run: |
        bandit -r weather_shield.py app.py -f json -o bandit-report.json || true

    - name: SonarCloud Scan (Optional)
      if: env.SONAR_TOKEN != ''
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=palpitate013_weather-shield
          -Dsonar.organization=palpitate013
