name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 weather_shield.py app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 weather_shield.py app.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code style with black
      run: |
        black --check weather_shield.py app.py

    - name: Check import sorting with isort
      run: |
        isort --check-only weather_shield.py app.py

    - name: Check syntax
      run: |
        python -m py_compile weather_shield.py app.py

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run application test
      run: |
        timeout 10 python weather_shield.py || true

    - name: Test imports
      run: |
        python -c "import weather_shield; print('✅ Import successful')"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t weather-shield:latest .

    - name: Test Docker container
      run: |
        docker run --rm weather-shield:latest python -c "import weather_shield; print('✅ Docker build successful')"

  build-packages:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-test, docker-build]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel twine
        sudo apt-get update
        sudo apt-get install -y dpkg debhelper devscripts dh-python python3-setuptools fakeroot

    - name: Build Python distribution
      run: |
        python -m build

    - name: Build Debian package
      run: |
        mkdir -p build/deb
        bash scripts/build-deb.sh build/deb

    - name: Build RPM package
      run: |
        mkdir -p build/rpm
        bash scripts/build-rpm.sh build/rpm

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: |
          dist/
          build/deb/*.deb
          build/rpm/*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build-packages]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: packages

    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        bodyFile: .github/release-template.md
        artifacts: "dist/*,build/deb/*.deb,build/rpm/*.rpm"

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  docker-release:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-test, docker-build]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/weather-shield:${{ github.ref_name }}
          ${{ secrets.DOCKER_USERNAME }}/weather-shield:latest

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest

    - name: Run tests with coverage
      run: |
        coverage run -m pytest || true
        coverage report --skip-covered
        coverage xml || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
